          window.DeviceMotionEvent = window.DeviceMotionEvent || {};
          DeviceMotionEvent.requestPermission = () => Promise.reject("Not needed");
        
          // Block addEventListener for 'devicemotion' and 'deviceorientation'
          const origAddEventListener = window.addEventListener;
          window.addEventListener = function(type, listener, options) {
            if (type === 'devicemotion' || type === 'deviceorientation') {
              // Block it
              console.log(`Blocked listener for: ${type}`);
              return;
            }
            return origAddEventListener.call(this, type, listener, options);
          };
        </script>
